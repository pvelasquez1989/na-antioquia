<div class="search-wrap">
  <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
  
  <!-- #searchInput crea una referencia. (input) detecta cuando escribes -->
  <input type="text" #searchInput (input)="onSearch($event)" placeholder="Buscar grupo, barrio, dirección..." autocomplete="off">
  
  <button (click)="clearSearch(searchInput)" title="Limpiar búsqueda">❌</button>
</div>
